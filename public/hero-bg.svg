<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <radialGradient id="g1" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a1206"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Dark base -->
  <rect width="1440" height="900" fill="url(#g1)"/>

  <!-- Grid lines subtle -->
  <g stroke="#D4AF37" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="150" x2="1440" y2="150"/>
    <line x1="0" y1="300" x2="1440" y2="300"/>
    <line x1="0" y1="450" x2="1440" y2="450"/>
    <line x1="0" y1="600" x2="1440" y2="600"/>
    <line x1="0" y1="750" x2="1440" y2="750"/>
    <line x1="288" y1="0" x2="288" y2="900"/>
    <line x1="576" y1="0" x2="576" y2="900"/>
    <line x1="864" y1="0" x2="864" y2="900"/>
    <line x1="1152" y1="0" x2="1152" y2="900"/>
  </g>

  <!-- Candlestick chart aesthetic -->
  <g stroke="#D4AF37" stroke-opacity="0.18" stroke-width="1.5" fill="none">
    <!-- Wick lines -->
    <line x1="120" y1="480" x2="120" y2="580"/>
    <line x1="180" y1="420" x2="180" y2="540"/>
    <line x1="240" y1="390" x2="240" y2="510"/>
    <line x1="300" y1="450" x2="300" y2="550"/>
    <line x1="360" y1="360" x2="360" y2="480"/>
    <line x1="420" y1="300" x2="420" y2="420"/>
    <line x1="480" y1="330" x2="480" y2="430"/>
    <line x1="540" y1="270" x2="540" y2="390"/>
    <line x1="600" y1="240" x2="600" y2="360"/>
    <line x1="660" y1="280" x2="660" y2="400"/>
    <line x1="720" y1="220" x2="720" y2="340"/>
    <line x1="780" y1="260" x2="780" y2="380"/>
    <line x1="840" y1="200" x2="840" y2="320"/>
    <line x1="900" y1="240" x2="900" y2="360"/>
    <line x1="960" y1="180" x2="960" y2="300"/>
    <line x1="1020" y1="220" x2="1020" y2="340"/>
    <line x1="1080" y1="200" x2="1080" y2="320"/>
    <line x1="1140" y1="240" x2="1140" y2="360"/>
    <line x1="1200" y1="180" x2="1200" y2="300"/>
    <line x1="1260" y1="160" x2="1260" y2="280"/>
    <line x1="1320" y1="200" x2="1320" y2="320"/>
  </g>

  <!-- Bullish candles (gold fill) -->
  <g fill="#D4AF37" fill-opacity="0.15" stroke="#D4AF37" stroke-opacity="0.25" stroke-width="1">
    <rect x="109" y="500" width="22" height="60"/>
    <rect x="229" y="420" width="22" height="70"/>
    <rect x="349" y="390" width="22" height="55"/>
    <rect x="409" y="330" width="22" height="65"/>
    <rect x="529" y="300" width="22" height="60"/>
    <rect x="589" y="265" width="22" height="70"/>
    <rect x="709" y="245" width="22" height="60"/>
    <rect x="829" y="220" width="22" height="65"/>
    <rect x="949" y="200" width="22" height="70"/>
    <rect x="1069" y="215" width="22" height="60"/>
    <rect x="1189" y="195" width="22" height="65"/>
    <rect x="1249" y="175" width="22" height="70"/>
  </g>

  <!-- Bearish candles -->
  <g fill="#555" fill-opacity="0.2" stroke="#888" stroke-opacity="0.15" stroke-width="1">
    <rect x="169" y="450" width="22" height="65"/>
    <rect x="289" y="470" width="22" height="55"/>
    <rect x="469" y="350" width="22" height="60"/>
    <rect x="649" y="300" width="22" height="65"/>
    <rect x="769" y="270" width="22" height="60"/>
    <rect x="889" y="250" width="22" height="65"/>
    <rect x="1009" y="230" width="22" height="60"/>
    <rect x="1129" y="250" width="22" height="65"/>
    <rect x="1309" y="215" width="22" height="70"/>
  </g>

  <!-- Trend line going up -->
  <polyline
    points="120,550 300,500 480,400 660,340 840,280 1020,250 1200,220 1380,190"
    fill="none"
    stroke="#D4AF37"
    stroke-opacity="0.2"
    stroke-width="2"
    stroke-dasharray="8 4"
  />

  <!-- Bottom vignette -->
  <rect width="1440" height="900" fill="url(#vignette)"/>
  <defs>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050505" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
</svg>
